worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;

    # 性能优化
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # 缓冲区设置
    client_body_buffer_size 16K;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    # 前端服务
    server {
        listen 80 reuseport;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # 启用 gzip 压缩
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 4;
        gzip_min_length 256;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/x-javascript;

        # 前端路由支持（React Router）
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 允许大文件上传 (resume, JD 等)
        client_max_body_size 150M;
        client_body_timeout 60s;
        client_header_timeout 10s;

        # 代理后端 API 请求 - 增强超时和缓冲
        location /api/ {
            proxy_pass http://localhost:4607;
            proxy_http_version 1.1;

            # 超时设置 - 防止长请求挂起
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 缓冲设置 - 提升性能
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 32k;
            proxy_busy_buffers_size 64k;

            # 头信息
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # 禁用缓存（针对动态 API）
            proxy_no_cache $arg_nocache;
            proxy_cache_bypass $arg_nocache;
        }

        # 健康检查端点 - 快速响应
        location /health {
            proxy_pass http://localhost:4607/api/v1/health;

            # 健康检查使用更短的超时
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;

            # 不缓冲
            proxy_buffering off;
        }

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
